<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Tata Motors Ticketing</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo-container" style="justify-content: center; margin-bottom: 24px;">
            <i data-lucide="user-plus" style="color: var(--tata-blue); width: 32px; height: 32px;"></i>
            <h1 style="color: var(--tata-blue); margin-top: 0;">Tata Motors</h1>
        </div>
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="newUsername">Username</label>
                <input type="text" id="newUsername" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="newPassword">Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Sign Up</button>
            <p style="text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-secondary);">
                Already have an account? <a href="index.html" style="color: var(--tata-blue); font-weight: 600; text-decoration: none;">Sign In</a>
            </p>
            <div id="signupMessage" style="color: var(--danger); text-align: center; margin-top: 16px; font-size: 0.875rem;"></div>
        </form>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <script src="app.js"></script>
</body>
</html>
