<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Tata Motors</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-container">
                <i data-lucide="shield-check" style="color: var(--tata-blue); width: 32px; height: 32px;"></i>
                <h1>Tata Motors</h1>
            </div>
            <ul class="nav-links">
                <li><a href="admin_dashboard.html" class="nav-item active"><i data-lucide="layout-dashboard"></i> <span>Admin Resolution</span></a></li>
            </ul>
            <div class="logout-btn" onclick="logout()">
                <i data-lucide="log-out"></i> <span>Logout</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header-row">
                <div class="page-title">
                    <h2>Admin Resolution Portal</h2>
                    <p style="color: var(--text-secondary);">Manage, respond to, and resolve user-submitted tickets.</p>
                </div>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <p class="stat-label">Tickets Needing Action</p>
                    <p id="admin-stat-active" class="stat-value" style="color: var(--warning);">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Total System Tickets</p>
                    <p id="admin-stat-total" class="stat-value">0</p>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--success);">
                    <p class="stat-label">Successfully Resolved</p>
                    <p id="admin-stat-resolved" class="stat-value" style="color: var(--success);">0</p>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: white; padding: 16px; border-radius: 8px; border: 1px solid var(--border-color);">
                <h3 style="margin: 0;">Ticket Management Queue</h3>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <span style="font-size: 0.875rem; font-weight: 600;">Filter by Status:</span>
                    <select id="statusFilter" style="width: auto; padding: 8px 12px; margin: 0; min-width: 150px;">
                        <option value="all">Show All Tickets</option>
                        <option value="Open">Only Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Closed">Closed / Resolved</option>
                    </select>
                </div>
            </div>

            <div id="adminTicketsList" class="ticket-grid">
                <!-- Admin tickets loaded here -->
            </div>
        </main>
    </div>
    <script src="app.js?v=2"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
