<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tata Motors Ticketing</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo-container" style="justify-content: center; margin-bottom: 24px;">
            <i data-lucide="shield-check" style="color: var(--tata-blue); width: 32px; height: 32px;"></i>
            <h1 style="color: var(--tata-blue); margin-top: 0;">Tata Motors</h1>
        </div>
        <h2>Sign In</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
            <p style="text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a href="signup.html" style="color: var(--tata-blue); font-weight: 600; text-decoration: none;">Sign Up</a>
            </p>
            <div id="loginMessage" style="color: var(--danger); text-align: center; margin-top: 16px; font-size: 0.875rem;"></div>
        </form>
    </div>
    <script src="app.js?v=2"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
